name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          build: true
          use-mathlib-cache: true
          use-github-cache: false
          leanchecker: true
          nanoda: true
          nanoda-allow-sorry: false
leanchecker: true
